name: Build and Deploy APK

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.apk'
      - '**.md'
      - '.github/**'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Compile Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 9.5.1

      - name: Decode Stable debug.keystore for Build
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding stable debug.keystore from debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found! Generating a fallback dummy debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Update Version Name and Create version.json
        run: |
          VERSION_BASE=$(grep "versionName =" app/build.gradle.kts | head -n 1 | awk -F'"' '{print $2}')
          VERSION_NAME="${VERSION_BASE}.${{ github.run_number }}"
          echo "Baking version: ${VERSION_NAME}"
          sed -i "s/versionName = .*/versionName = \"${VERSION_NAME}\"/g" app/build.gradle.kts
          
          cat <<EOF > version.json
          {
            "version": "${VERSION_NAME}",
            "changelog": "Build automático: Commit ${{ github.event.head_commit.message }}",
            "downloadUrl": "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/app-debug.apk"
          }
          EOF

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Copy APK to Root for Updater
        run: |
          mkdir -p build-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk ./app-debug.apk

      - name: Commit and Push Compiled APK
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app-debug.apk version.json app/build.gradle.kts
          git diff-index --quiet HEAD || (git commit -m "Auto-compile: Build APK and update version.json to match" && git push origin HEAD:${{ github.ref_name }})
