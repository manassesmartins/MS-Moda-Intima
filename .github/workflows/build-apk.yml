name: Build and Deploy APK

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.apk'
      - '**.md'
      - '.github/**'

permissions:
  contents: write

jobs:
  build:
    name: Compile Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.11.1

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Copy APK to Root for Updater
        run: |
          mkdir -p build-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk ./app-debug.apk

      - name: Commit and Push Compiled APK
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app-debug.apk
          git diff-index --quiet HEAD || (git commit -m "Auto-compile: Build APK for commit ${{ github.sha }}" && git push origin HEAD:${{ github.ref_name }})
